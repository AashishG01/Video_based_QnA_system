version: '3.8'

services:
  # =====================================================
  # Vector Database
  # =====================================================
  qdrant:
    image: qdrant/qdrant:latest
    container_name: videobrain-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # =====================================================
  # Backend API (FastAPI)
  # =====================================================
  backend:
    build: .
    container_name: videobrain-backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    depends_on:
      - qdrant
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    restart: unless-stopped

  # =====================================================
  # Frontend (React + Vite)
  # =====================================================
  frontend:
    build: ./frontend
    container_name: videobrain-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  qdrant_data:
